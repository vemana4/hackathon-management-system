version: '3.8'

services:
  hackathon-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackathon_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SESSION_SECRET=production-secret-override
    volumes:
      - app_db:/app/instance
      - ml_models:/app/models
    restart: unless-stopped

volumes:
  app_db:
  ml_models:
